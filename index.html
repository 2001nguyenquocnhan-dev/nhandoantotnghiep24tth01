<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng tới TIỆM TẠP HÓA BÀ BẢY</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* CSS bổ sung dành riêng cho trang Welcome */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .welcome-bg {
            background-image: linear-gradient(rgba(255, 251, 251, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('anh1.jpg'); 
            height: 110vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .welcome-content h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: fadeInDown 1.5s ease;
        }

        .welcome-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-style: italic;
            animation: fadeInUp 2s ease;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s transform, 0.3s background-color;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-start:hover {
            background-color: #ee5253;
            transform: scale(1.1);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="welcome-bg">
        <div class="welcome-content">
            <h1>TIỆM TẠP HÓA BÀ BẢY </h1>
            <p>Nơi Lựa chọn những yêu thích của khách hàng</p>
            <a href="index1.html" class="btn-start">KHÁM PHÁ SẢN PHẨM</a>
        </div>
    </div>

</body>
</html>
